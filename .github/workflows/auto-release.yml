name: Auto Release
on:
  push:
    branches: [main]
permissions:
  contents: write
  id-token: write
jobs:
  auto-release:
    name: Bump Version and Publish
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, '[skip release]')"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20.x
          cache: npm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Configure git identity
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Bump patch version
        id: bump
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          TAG="v$CURRENT"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag $TAG already exists — skipping version bump"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "already_tagged=true" >> "$GITHUB_OUTPUT"
          else
            npm version patch -m "chore(release): %s [skip release]"
            NEW=$(node -p "require('./package.json').version")
            echo "version=$NEW" >> "$GITHUB_OUTPUT"
            echo "already_tagged=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push version bump and tag
        if: steps.bump.outputs.already_tagged == 'false'
        run: |
          git push origin main
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Check if version already published on npm
        id: npm_check
        run: |
          VERSION="${{ steps.bump.outputs.version }}"
          if npm view "clean-slop@$VERSION" version >/dev/null 2>&1; then
            echo "Version $VERSION already on npm — skipping publish"
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        if: steps.npm_check.outputs.skip == 'false'
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Create GitHub Release
        if: steps.npm_check.outputs.skip == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.bump.outputs.version }}
          name: clean-slop v${{ steps.bump.outputs.version }}
          draft: false
          prerelease: false
          generate_release_notes: true
